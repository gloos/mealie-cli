# GoReleaser configuration. Validate with `make release-check`.
# Docs: https://goreleaser.com
version: 2

project_name: mealie

before:
  hooks:
    - go mod tidy

builds:
  - id: mealie
    main: ./cmd/mealie
    binary: mealie
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gloos/mealie-cli/internal/buildinfo.Version={{ .Version }}
      - -X github.com/gloos/mealie-cli/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/gloos/mealie-cli/internal/buildinfo.Date={{ .Date }}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Keyless cosign signature over the checksums file, which in turn covers every
# archive. cosign v3 writes a single Sigstore bundle (checksums.txt.sigstore.json)
# holding the certificate, signature and Rekor inclusion proof, replacing the
# separate .pem/.sig files used under cosign v2. Verifying a download is two steps
# — the signature establishes that checksums.txt came from this repo's release
# pipeline, then the archive's digest is checked against that now-trusted file:
#
#   # 1. verify the signature on checksums.txt (needs cosign v3+)
#   cosign verify-blob \
#     --bundle checksums.txt.sigstore.json \
#     --certificate-identity-regexp '^https://github\.com/gloos/mealie-cli/\.github/workflows/release\.yml@refs/tags/v' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
#
#   # 2. verify the downloaded archive against the trusted checksums file
#   #    (--ignore-missing checks only the archive(s) you actually downloaded)
#   sha256sum --ignore-missing -c checksums.txt      # Linux
#   shasum -a 256 --ignore-missing -c checksums.txt  # macOS
#
# Verifying step 1 alone does NOT verify any archive; step 2 is required.
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

# Homebrew publishing is intentionally not configured yet. To add it later, set
# up a `homebrew_casks` block (the v2 replacement for the deprecated `brews`
# pipeline) targeting a dedicated tap repository, plus a HOMEBREW_TAP_GITHUB_TOKEN
# secret with write access to that tap.
# See https://goreleaser.com/customization/homebrew_casks/

release:
  prerelease: auto
  footer: |
    ---
    Install: download the archive for your platform, or `go install github.com/gloos/mealie-cli/cmd/mealie@{{ .Tag }}`.
