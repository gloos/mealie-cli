# GoReleaser configuration. Validate with `make release-check`.
# Docs: https://goreleaser.com
version: 2

project_name: mealie

before:
  hooks:
    - go mod tidy

builds:
  - id: mealie
    main: ./cmd/mealie
    binary: mealie
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gloos/mealie-cli/internal/buildinfo.Version={{ .Version }}
      - -X github.com/gloos/mealie-cli/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/gloos/mealie-cli/internal/buildinfo.Date={{ .Date }}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Keyless cosign signatures over the checksums file (which in turn covers every
# archive). Lets users verify a download came from this repo's release pipeline:
#   cosign verify-blob \
#     --certificate checksums.txt.pem \
#     --signature  checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/gloos/mealie-cli/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

# Homebrew publishing is intentionally not configured yet. To add it later, set
# up a `homebrew_casks` block (the v2 replacement for the deprecated `brews`
# pipeline) targeting a dedicated tap repository, plus a HOMEBREW_TAP_GITHUB_TOKEN
# secret with write access to that tap.
# See https://goreleaser.com/customization/homebrew_casks/

release:
  prerelease: auto
  footer: |
    ---
    Install: download the archive for your platform, or `go install github.com/gloos/mealie-cli/cmd/mealie@{{ .Tag }}`.
